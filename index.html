<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/x-icon" href="images/favicon.png"/>
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="card">
      <div class="search">
        <form class="search-form">
          <input type="text" placeholder="enter a city" spellcheck="false" />
          <button type = "submit"><img src="images/search.png" alt="search" /></button>
        </form>
      </div>
      <div class="error">
        <p>Not found :&#40;</p>
      </div>
      <div class="weather">
        <div class="time">
            <p></p>
        </div>
        <img src="images/clear.png" class="weather-icon" />
        <h1 class="temp"></h1>
        <h2 class="city"></h2>
        <div class="details">
          <div class="col">
            <img src="images/humidity.png" alt="humidity" />
            <div>
              <p class="humidity"></p>
              <p>Humidity</p>
            </div>
          </div>
          <div class="col">
            <img src="images/wind.png" alt="wind" />
            <div>
              <p class="wind"></p>
              <p>Wind Speed</p>
            </div>
          </div>
        </div>
        <div class="forecast">
          <div class="day">
            <img src="">
            <p class="day-1"></p>
            <p class="day-1-weather"></p>
          </div>
          <div class="day">
            <img src="">
            <p class="day-2"></p>
            <p class="day-2-weather"></p>
          </div>
          <div class="day">
            <img src="">
            <p class="day-3"></p>
            <p class="day-3-weather"></p>
          </div>
          <div class="day">
            <img src="">
            <p class="day-4"></p>
            <p class="day-4-weather"></p>
          </div>
          <div class="day">
            <img src="">
            <p class="day-5"></p>
            <p class="day-5-weather"></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
