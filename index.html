<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/x-icon" href="images/favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script defer src="script.js"></script>
  </head>
  <body>
    <div id="card">
      <div class="search">
        <form class="search-form">
          <input type="text" placeholder="enter a city" spellcheck="false" />
          <button type="submit">
            <img src="images/search.png" alt="search" />
          </button>
        </form>
      </div>
      <div class="error">
        <p>Not found :&#40;</p>
      </div>
      <div class="weather">
        <div class="time">
          <p></p>
        </div>
        <img src="images/clear.png" class="weather-icon" />
        <h1 class="temp"></h1>
        <h2 class="city"></h2>
        <div class="details">
          <div class="col">
            <img src="images/humidity.png" alt="humidity" />
            <div>
              <p class="humidity"></p>
              <p>Humidity</p>
            </div>
          </div>
          <div class="col">
            <img src="images/wind.png" alt="wind" />
            <div>
              <p class="wind"></p>
              <p>Wind Speed</p>
            </div>
          </div>
        </div>
        <div id="forecast" class="row justify-content-around">
          <div class="day col-4 col-sm-2 text-center">
            <img src="" class="img-fluid" />
            <p id="day-1" class="mb-0"></p>
            <p id="day-1-weather" class="mb-0"></p>
          </div>
          <div class="day col-4 col-sm-2 text-center">
            <img src="" class="img-fluid" />
            <p id="day-2" class="mb-0"></p>
            <p id="day-2-weather" class="mb-0"></p>
          </div>
          <div class="day col-4 col-sm-2 text-center">
            <img src="" class="img-fluid" />
            <p id="day-3" class="mb-0"></p>
            <p id="day-3-weather" class="mb-0"></p>
          </div>
          <div class="day col-4 col-sm-2 text-center">
            <img src="" class="img-fluid" />
            <p id="day-4" class="mb-0"></p>
            <p id="day-4-weather" class="mb-0"></p>
          </div>
          <div class="day col-4 col-sm-2 text-center">
            <img src="" class="img-fluid" />
            <p id="day-5" class="mb-0"></p>
            <p id="day-5-weather" class="mb-0"></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
